<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge - SWOT</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-page="swot">
    <header class="topbar">
        <button class="help-btn" id="help-btn" type="button" aria-label="Afficher l’aide">?</button>

        <div class="project-info" aria-label="Informations générales du projet">
            <label class="project-field">
                <span>Nom</span>
                <input id="project-name" type="text" placeholder="Nom du projet" data-project-field="name" />
            </label>
        </div>

        <button class="project-new-btn" id="new-project-btn" type="button" aria-label="Créer un nouveau projet">+</button>

        <div class="project-switcher" aria-label="Sélection du projet">
            <label class="project-switcher-field">
                <span>Projet actif</span>
                <select id="project-selector"></select>
            </label>
        </div>

        <div class="theme-switcher" aria-label="Sélection du thème">
            <label class="theme-switcher-field">
                <span>Thème</span>
                <select id="theme-selector">
                    <option value="cyber">Cyber dark</option>
                    <option value="light">Clair</option>
                    <option value="orange">Orange dusk</option>
                    <option value="executive">Executive report</option>
                </select>
            </label>
        </div>

        <div class="portable-controls" aria-label="Sauvegarde portable">
            <button class="portable-btn" id="export-data-btn" type="button" title="Télécharger une sauvegarde complète (JSON)">Exporter</button>
            <button class="portable-btn" id="import-data-btn" type="button" title="Restaurer une sauvegarde complète (JSON)">Importer</button>
            <input id="import-data-input" type="file" accept="application/json,.json" hidden />
        </div>
    </header>

    <nav id="page-nav" class="page-nav grouped-page-nav structured-page-nav" aria-label="Navigation principale"></nav>

    <main class="container">
        <section class="card swot-main-card">
            <div class="card-header">
                <h2>SWOT</h2>
            </div>

            <div class="swot-grid">
                <section class="swot-box swot-strengths" data-swot-category="strengths">
                    <div class="swot-box-header">
                        <div class="swot-title-row">
                            <h3>Forces</h3>
                            <div class="swot-mini-actions" aria-label="Actions Forces">
                                <button class="swot-icon-btn swot-add-btn" type="button" data-category="strengths" aria-label="Ajouter un élément">+</button>
                                <button class="swot-icon-btn swot-delete-btn" type="button" data-category="strengths" aria-label="Supprimer les éléments cochés" disabled>-</button>
                            </div>
                        </div>
                        <p>Ce qui aide le projet en interne.</p>
                    </div>

                    <div class="swot-list" id="swot-strengths-list"></div>
                </section>

                <section class="swot-box swot-weaknesses" data-swot-category="weaknesses">
                    <div class="swot-box-header">
                        <div class="swot-title-row">
                            <h3>Faiblesses</h3>
                            <div class="swot-mini-actions" aria-label="Actions Faiblesses">
                                <button class="swot-icon-btn swot-add-btn" type="button" data-category="weaknesses" aria-label="Ajouter un élément">+</button>
                                <button class="swot-icon-btn swot-delete-btn" type="button" data-category="weaknesses" aria-label="Supprimer les éléments cochés" disabled>-</button>
                            </div>
                        </div>
                        <p>Ce qui fragilise le projet en interne.</p>
                    </div>

                    <div class="swot-list" id="swot-weaknesses-list"></div>
                </section>

                <section class="swot-box swot-opportunities" data-swot-category="opportunities">
                    <div class="swot-box-header">
                        <div class="swot-title-row">
                            <h3>Opportunités</h3>
                            <div class="swot-mini-actions" aria-label="Actions Opportunités">
                                <button class="swot-icon-btn swot-add-btn" type="button" data-category="opportunities" aria-label="Ajouter un élément">+</button>
                                <button class="swot-icon-btn swot-delete-btn" type="button" data-category="opportunities" aria-label="Supprimer les éléments cochés" disabled>-</button>
                            </div>
                        </div>
                        <p>Les éléments externes favorables.</p>
                    </div>

                    <div class="swot-list" id="swot-opportunities-list"></div>
                </section>

                <section class="swot-box swot-threats" data-swot-category="threats">
                    <div class="swot-box-header">
                        <div class="swot-title-row">
                            <h3>Menaces</h3>
                            <div class="swot-mini-actions" aria-label="Actions Menaces">
                                <button class="swot-icon-btn swot-add-btn" type="button" data-category="threats" aria-label="Ajouter un élément">+</button>
                                <button class="swot-icon-btn swot-delete-btn" type="button" data-category="threats" aria-label="Supprimer les éléments cochés" disabled>-</button>
                            </div>
                        </div>
                        <p>Les risques ou contraintes externes.</p>
                    </div>

                    <div class="swot-list" id="swot-threats-list"></div>
                </section>
            </div>

            <div class="table-actions swot-global-actions">

                <button class="btn btn-danger btn-reset" id="reset-swot-btn" type="button">Réinitialiser</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="forge-footer-brand" aria-label="Forge">
            <span class="forge-logo" aria-hidden="true">
                <span class="forge-logo-bar"></span>
                <span class="forge-logo-head"></span>
            </span>
            <span class="forge-name">Forge</span>
        </div>
    </footer>

    <div class="modal-overlay hidden" id="help-modal" role="dialog" aria-modal="true" aria-labelledby="help-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="help-title">Aide</h2>
                <button class="modal-close" id="help-close-btn" type="button" aria-label="Fermer l’aide">×</button>
            </div>
            <div class="modal-body" id="help-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
