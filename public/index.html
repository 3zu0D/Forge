<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge - Parties prenantes</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-page="stakeholders">
    <header class="topbar">
        <button class="help-btn" id="help-btn" type="button" aria-label="Afficher l’aide">?</button>

        <div class="project-info" aria-label="Informations générales du projet">
            <label class="project-field">
                <span>Nom</span>
                <input id="project-name" type="text" placeholder="Nom du projet" data-project-field="name" />
            </label>
        </div>

        <button class="project-new-btn" id="new-project-btn" type="button" aria-label="Créer un nouveau projet">+</button>

        <div class="project-switcher" aria-label="Sélection du projet">
            <label class="project-switcher-field">
                <span>Projet actif</span>
                <select id="project-selector"></select>
            </label>
        </div>

        <div class="theme-switcher" aria-label="Sélection du thème">
            <label class="theme-switcher-field">
                <span>Thème</span>
                <select id="theme-selector">
                    <option value="cyber">Cyber dark</option>
                    <option value="light">Clair</option>
                    <option value="orange">Orange dusk</option>
                    <option value="executive">Executive report</option>
                </select>
            </label>
        </div>

        <div class="portable-controls" aria-label="Sauvegarde portable">
            <button class="portable-btn" id="export-data-btn" type="button" title="Télécharger une sauvegarde complète (JSON)">Exporter</button>
            <button class="portable-btn" id="import-data-btn" type="button" title="Restaurer une sauvegarde complète (JSON)">Importer</button>
            <input id="import-data-input" type="file" accept="application/json,.json" hidden />
        </div>
    </header>

    <nav id="page-nav" class="page-nav grouped-page-nav structured-page-nav" aria-label="Navigation principale"></nav>

    <main class="container">
        <section class="card">
            <div class="card-header">
                <h2>Parties Prenantes</h2>
            </div>

            <div class="table-actions table-actions-top">
                <div class="left-actions">
                    <button class="btn icon-action-btn icon-add-btn" id="add-person-btn" type="button" title="Ajouter une personne" aria-label="Ajouter une personne">+</button>
                    <button class="btn btn-danger icon-action-btn icon-delete-btn" id="delete-selected-btn" type="button" disabled title="Supprimer la sélection" aria-label="Supprimer la sélection">-</button>
                </div>

                <button class="btn btn-danger btn-reset" id="reset-btn" type="button">Réinitialiser</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="select-col">
                                <input id="select-all-checkbox" class="row-checkbox" type="checkbox" aria-label="Tout sélectionner" />
                            </th>
                            <th>N°</th>
                            <th class="select-col"></th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Fonction</th>
                            <th>Rôle</th>
                            <th>Responsabilité</th>
                        </tr>
                    </thead>
                    <tbody id="stakeholders-table"></tbody>
                </table>
            </div>
        </section>
    </main>


    <footer>
        <div class="forge-footer-brand" aria-label="Forge">
            <span class="forge-logo" aria-hidden="true">
                <span class="forge-logo-bar"></span>
                <span class="forge-logo-head"></span>
            </span>
            <span class="forge-name">Forge</span>
        </div>
    </footer>

    <div class="color-menu hidden" id="color-menu" aria-label="Choix de couleur"></div>

    <div class="modal-overlay hidden" id="help-modal" role="dialog" aria-modal="true" aria-labelledby="help-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="help-title">Aide</h2>
                <button class="modal-close" id="help-close-btn" type="button" aria-label="Fermer l’aide">×</button>
            </div>
            <div class="modal-body" id="help-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
