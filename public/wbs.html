<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge - WBS</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-page="wbs">
    <header class="topbar">
        <button class="help-btn" id="help-btn" type="button" aria-label="Afficher l’aide">?</button>

        <div class="project-info" aria-label="Informations générales du projet">
            <label class="project-field">
                <span>Nom</span>
                <input id="project-name" type="text" placeholder="Nom du projet" data-project-field="name" />
            </label>
        </div>

        <button class="project-new-btn" id="new-project-btn" type="button" aria-label="Créer un nouveau projet">+</button>

        <div class="project-switcher" aria-label="Sélection du projet">
            <label class="project-switcher-field">
                <span>Projet actif</span>
                <select id="project-selector"></select>
            </label>
        </div>

        <div class="theme-switcher" aria-label="Sélection du thème">
            <label class="theme-switcher-field">
                <span>Thème</span>
                <select id="theme-selector">
                    <option value="cyber">Cyber dark</option>
                    <option value="light">Clair</option>
                    <option value="orange">Orange dusk</option>
                    <option value="executive">Executive report</option>
                </select>
            </label>
        </div>

        <div class="portable-controls" aria-label="Sauvegarde portable">
            <button class="portable-btn" id="export-data-btn" type="button" title="Télécharger une sauvegarde complète (JSON)">Exporter</button>
            <button class="portable-btn" id="import-data-btn" type="button" title="Restaurer une sauvegarde complète (JSON)">Importer</button>
            <input id="import-data-input" type="file" accept="application/json,.json" hidden />
        </div>
    </header>

    <nav id="page-nav" class="page-nav grouped-page-nav structured-page-nav" aria-label="Navigation principale"></nav>

    <main class="container wbs-container">
        <div class="wbs-layout">
            <aside class="wbs-sidebar">

                <section class="card wbs-project-dates-card">
                    <div class="card-header">
                        <h2>Dates du projet</h2>
                    </div>

                    <div class="wbs-project-dates">
                        <label class="project-field wbs-date-field">
                            <span>Date de début</span>
                            <input id="project-start-date" type="date" data-project-field="startDate" />
                        </label>

                        <label class="project-field wbs-date-field">
                            <span>Date de fin</span>
                            <input id="project-end-date" type="date" data-project-field="endDate" />
                        </label>
                    </div>
                </section>
                <section class="card phases-card">
            <div class="card-header">
                <h2>Phases du projet</h2>
            </div>

            <div class="table-wrapper">
                <table class="phases-table">
                    <colgroup>
                        <col class="phase-col-select" />
                        <col class="phase-col-number" />
                        <col class="phase-col-name" />
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="select-col">
                                <input id="select-all-phases-checkbox" class="row-checkbox" type="checkbox" aria-label="Tout sélectionner les phases" />
                            </th>
                            <th class="phase-number-cell">N°</th>
                            <th>Phase</th>
                        </tr>
                    </thead>
                    <tbody id="phases-table"></tbody>
                </table>
            </div>

            <div class="table-actions">
                <div class="left-actions">
                    <button class="btn icon-action-btn icon-add-btn" id="add-phase-btn" type="button" title="Ajouter une phase" aria-label="Ajouter une phase">+</button>
                    <button class="btn btn-danger icon-action-btn icon-delete-btn" id="delete-selected-phases-btn" type="button" disabled title="Supprimer la sélection" aria-label="Supprimer la sélection">-</button>
                </div>

                <button class="btn btn-danger btn-reset" id="reset-phases-btn" type="button">Réinitialiser</button>
            </div>
                </section>
            </aside>

            <section class="card wbs-card">
            <div class="card-header">
                <h2>WBS</h2>
            </div>

            <div class="wbs-planning-toolbar">
                <label class="wbs-weekend-toggle">
                    <input id="wbs-weekends-worked" type="checkbox" />
                    <span>Week-ends travaillés</span>
                    <strong id="wbs-weekend-status">Non</strong>
                </label>
            </div>

            <div class="table-wrapper">
                <table class="wbs-table">
                    <colgroup>
                        <col class="wbs-col-select" />
                        <col class="wbs-col-number" />
                        <col class="wbs-col-move" />
                        <col class="wbs-col-task" />
                        <col class="wbs-col-owner" />
                        <col class="wbs-col-small" />
                        <col class="wbs-col-small" />
                        <col class="wbs-col-small" />
                        <col class="wbs-col-date" />
                        <col class="wbs-col-date" />
                        <col class="wbs-col-progress" />
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="select-col">
                                <input id="select-all-wbs-checkbox" class="row-checkbox" type="checkbox" aria-label="Tout sélectionner les lignes WBS" />
                            </th>
                            <th class="wbs-number-cell">N°</th>
                            <th class="wbs-move-header"></th>
                            <th>Tâche / Livrable</th>
                            <th>Responsable</th>
                            <th>Jour<br>début</th>
                            <th>Durée<br>(j)</th>
                            <th>Jour<br>fin</th>
                            <th>Date début</th>
                            <th>Date fin</th>
                            <th>Avanc.<br>%</th>
                        </tr>
                    </thead>
                    <tbody id="wbs-table"></tbody>
                </table>
            </div>

            <div class="table-actions">
                <div class="left-actions">
                    <button class="btn icon-action-btn icon-add-btn" id="add-wbs-row-btn" type="button" title="Ajouter une ligne" aria-label="Ajouter une ligne">+</button>
                    <button class="btn btn-danger icon-action-btn icon-delete-btn" id="delete-selected-wbs-btn" type="button" disabled title="Supprimer la sélection" aria-label="Supprimer la sélection">-</button>
                </div>

                <button class="btn btn-danger btn-reset" id="reset-wbs-btn" type="button">Réinitialiser</button>
            </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="forge-footer-brand" aria-label="Forge">
            <span class="forge-logo" aria-hidden="true">
                <span class="forge-logo-bar"></span>
                <span class="forge-logo-head"></span>
            </span>
            <span class="forge-name">Forge</span>
        </div>
    </footer>

    <div class="color-menu hidden" id="color-menu" aria-label="Choix de couleur"></div>

    <div class="modal-overlay hidden" id="help-modal" role="dialog" aria-modal="true" aria-labelledby="help-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="help-title">Aide</h2>
                <button class="modal-close" id="help-close-btn" type="button" aria-label="Fermer l’aide">×</button>
            </div>
            <div class="modal-body" id="help-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
